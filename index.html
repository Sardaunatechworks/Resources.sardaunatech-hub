<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Resources | Sardauna Tech Hub</title>
  <meta name="description" content="Access high-quality learning materials for Cybersecurity, AI, Web Development, and more at Sardauna Tech Hub.">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Sardauna Tech Hub</h1>
    <p>Empowering the next generation of tech leaders with premium resources.</p>
  </header>

  <main>
    <section id="controls">
      <div class="control-group">
        <label for="course">Learning Path</label>
        <select id="course">
          <option value="all">All Learning Paths</option>
          <option value="cybersecurity">Cybersecurity</option>
          <option value="ai">Artificial Intelligence</option>
          <option value="web">Web Development</option>
          <option value="cloud">Cloud Computing</option>
          <option value="uiux">UI/UX Design</option>
        </select>
      </div>

      <div class="control-group">
        <label for="search">Search Resources</label>
        <input type="text" id="search" placeholder="Search by title or topic..." autocomplete="off">
      </div>
    </section>

    <section id="resource-container">
      <div id="resource-list">
        <!-- Resources will be dynamically injected here -->
      </div>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
